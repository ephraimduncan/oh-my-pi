name: Sync upstream

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

# Keep the personal fork moving with can1357/oh-my-pi without clobbering local work.
concurrency:
  group: sync-upstream
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.merge.outputs.status }}
      version: ${{ steps.merge.outputs.version }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout fork main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Merge upstream main
        id: merge
        shell: bash
        run: |
          set -u

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config merge.ours.driver true
          git remote add upstream https://github.com/can1357/oh-my-pi.git
          git remote set-url --push upstream DISABLED
          git fetch --tags upstream main:refs/remotes/upstream/main

          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "Fork already contains upstream/main."
            echo "status=up-to-date" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git merge --no-edit upstream/main; then
            {
              echo "status=conflict"
              echo "conflicts<<EOF"
              git diff --name-only --diff-filter=U
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            git merge --abort || true
            exit 0
          fi

          echo "status=merged" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "version=$(jq -r .version packages/coding-agent/package.json)" >> "$GITHUB_OUTPUT"

      - name: Push synced main
        if: steps.merge.outputs.status == 'merged'
        run: git push origin HEAD:main

      - name: Create and push release tag
        if: steps.merge.outputs.status == 'merged'
        id: tag
        run: |
          set -euo pipefail
          tag="v${{ steps.merge.outputs.version }}-sync.${{ github.run_number }}"
          git tag -f "$tag" HEAD
          git push -f origin "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Report merge conflict
        if: steps.merge.outputs.status == 'conflict'
        run: |
          {
            echo "## Upstream sync conflict"
            echo
            echo "Could not merge \`can1357/oh-my-pi:main\` into this fork's \`main\`."
            echo
            echo "### Conflicting files"
            echo '```'
            echo "${{ steps.merge.outputs.conflicts }}"
            echo '```'
            echo
            echo "Resolve locally: \`git fetch upstream main && git merge upstream/main\`, resolve, run \`bun check\`, push \`main\`."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1

  release:
    needs: sync
    if: needs.sync.outputs.status == 'merged'
    permissions:
      contents: write
    uses: ./.github/workflows/fork-release.yml
    with:
      tag: ${{ needs.sync.outputs.tag }}
